name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.app.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: comment-sender
            path: comment-sender
            spec: comment-sender.spec
            requirements: requirements.txt
            output: comment-sender
          - name: player-jiggle
            path: player-jiggle
            spec: player-jiggle.spec
            requirements: requirements.txt
            output: player-jiggle

    defaults:
      run:
        shell: pwsh
        working-directory: ${{ matrix.app.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            ${{ matrix.app.path }}/${{ matrix.app.requirements }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ${{ matrix.app.requirements }} pyinstaller

      - name: Verify source compiles
        run: python -m compileall .

      - name: Build executable
        run: pyinstaller --noconfirm --clean ${{ matrix.app.spec }}

      - name: Archive build output
        run: |
          $archive = "${{ matrix.app.output }}-${{ github.sha }}.zip"
          Compress-Archive -Path "dist/${{ matrix.app.output }}/*" -DestinationPath $archive -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.output }}-${{ github.sha }}
          path: ${{ matrix.app.path }}/${{ matrix.app.output }}-${{ github.sha }}.zip
          if-no-files-found: error
