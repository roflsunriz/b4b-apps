name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Release ${{ matrix.app.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: comment-sender
            path: comment-sender
            spec: comment-sender.spec
            requirements: requirements.txt
            output: comment-sender
          - name: player-jiggle
            path: player-jiggle
            spec: player-jiggle.spec
            requirements: requirements.txt
            output: player-jiggle

    defaults:
      run:
        shell: pwsh
        working-directory: ${{ matrix.app.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            ${{ matrix.app.path }}/${{ matrix.app.requirements }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ${{ matrix.app.requirements }} pyinstaller

      - name: Verify source compiles
        run: python -m compileall .

      - name: Build executable
        run: pyinstaller --noconfirm --clean ${{ matrix.app.spec }}

      - name: Archive release asset
        run: |
          $version = if ("${{ github.ref_name }}") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          $archive = "${{ matrix.app.output }}-$version-windows.zip"
          Compress-Archive -Path "dist/${{ matrix.app.output }}/*" -DestinationPath $archive -Force

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.output }}-release-${{ github.run_id }}
          path: ${{ matrix.app.path }}/${{ matrix.app.output }}-*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist-assets
          pattern: '*-release-${{ github.run_id }}'
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist-assets/*.zip
